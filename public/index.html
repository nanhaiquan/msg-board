<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>南海山论坛</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI","Noto Sans SC",sans-serif;background:#f5f5f7;color:#1a1a1e;padding:0 0 80px}
.h{max-width:600px;margin:0 auto;padding:16px;border-bottom:1px solid #e8e8ec;display:flex;justify-content:space-between;align-items:center}
.h h1{font-size:16px;font-weight:700}
.h h1 em{font-style:normal;color:#4a6cf7}
.h button{padding:4px 10px;border:1px solid #ddd;border-radius:5px;background:#fff;font-size:12px;cursor:pointer}
.sc{max-width:600px;margin:0 auto;padding:16px}
.ib{background:#fff;border:1px solid #e8e8ec;border-radius:8px;padding:12px;margin-bottom:16px}
.ib input,.ib textarea{width:100%;border:none;outline:none;font:inherit;font-size:14px;resize:none;background:transparent}
.ib input{border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:8px}
.ib textarea{min-height:52px}
.ib textarea::placeholder{color:#aaa}
.bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.bar .c{font-size:12px;color:#aaa}
.bar button{padding:6px 20px;border:none;border-radius:6px;background:#4a6cf7;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.bar button:hover{opacity:.85}
.fd{display:flex;flex-direction:column}
.pt{padding:14px 0;border-bottom:1px solid #eee}
.pt:last-child{border:none}
.pm{display:flex;gap:8px;align-items:center;margin-bottom:3px}
.nn{font-size:13px;font-weight:600;color:#4a6cf7}
.tt{font-size:12px;color:#aaa}
.ct{font-size:14px;line-height:1.7;color:#1a1a1e}
.pa{display:flex;gap:10px;margin-top:5px}
.pa button{background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;padding:2px}
.pa button:hover{color:#4a6cf7}
.rp{margin-top:6px;margin-left:18px;padding-left:10px;border-left:2px solid #e8e8ec}
.rp .i{font-size:13px;padding:5px 0}
.ri{display:flex;gap:6px;margin-top:6px;margin-left:18px}
.ri input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;outline:none}
.ri input:focus{border-color:#4a6cf7}
.ri button{padding:4px 12px;border:none;border-radius:4px;background:#4a6cf7;color:#fff;font-size:12px;cursor:pointer}
.em{text-align:center;color:#aaa;padding:60px 0;font-size:14px}
#ts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1e;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
#ts.on{opacity:1}
</style>
</head>
<body>
<div class="h"><h1>南海<em>山</em> 论坛</h1><button onclick="ct()">换肤</button></div>
<div class="sc">
  <div class="ib">
    <input id="n" placeholder="昵称" maxlength="20">
    <textarea id="c" placeholder="说点什么…" maxlength="1000"></textarea>
    <div class="bar"><span class="c"><span id="cc">0</span>/1000</span><button id="s">发布</button></div>
  </div>
  <div class="fd" id="fd"><div class="em">加载中</div></div>
</div>
<div id="ts"></div>
<script>
const $=id=>document.getElementById(id);
const ts=m=>{const t=$('ts');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1800)};
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const ta=t=>{const d=new Date(t),s=(Date.now()-d)/1000;if(s<10)return'刚刚';if(s<60)return Math.floor(s)+'秒前';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前'}
const fmt=t=>{const d=new Date(t);return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`}

// 回车发送
$('c').addEventListener('keydown',e=>{if(e.key=='Enter'&&!e.shiftKey){e.preventDefault();sd()}});

// 主题
let ti=0;
function ct(){const ts=['#f5f5f7','#1a1a1e','#faf4e8'];const cs=['#1a1a1e','#eee','#3a3024'];document.body.style.background=ts[ti];document.body.style.color=cs[ti];ti=(ti+1)%ts.length}

// 社区
$('s').onclick=sd;$('c').oninput=()=>$('cc').textContent=$('c').value.length;ld();
async function ld(){try{const r=await fetch('/api/msgs');const m=await r.json();rd(m)}catch{}}
function rd(ms){const el=$('fd');if(!ms.length){el.innerHTML='<div class="em">还没有留言</div>';return}
el.innerHTML=ms.map(m=>`<div class="pt"><div class="pm"><span class="nn">${esc(m.name||'匿名')}</span><span class="tt" title="${fmt(m.time)}">${ta(m.time)}</span></div><div class="ct">${esc(m.content)}</div><div class="pa"><button onclick="lk(${m._id},this)">♡ ${m.likes||0}</button><button onclick="tr(${m._id})">回复</button><button onclick="dm(${m._id})">✕</button></div><div class="rp" id="rp-${m._id}"></div><div class="ri" id="ri-${m._id}" style="display:none"><input id="rn-${m._id}" placeholder="回复…"><button onclick="sr(${m._id})">回复</button></div></div>`).join('');
ms.forEach(m=>lr(m._id))}
async function sd(){const n=$('n').value.trim(),c=$('c').value.trim();if(!c)return;const b=$('s');b.disabled=true;b.textContent='…';try{const r=await fetch('/api/msgs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,content:c})});if(r.status==403){const d=await r.json();ts(d.error);return}if(!r.ok){ts('失败');return}$('n').value='';$('c').value='';$('cc').textContent='0';ld()}catch{ts('网络错误')}finally{b.disabled=false;b.textContent='发布'}}
async function lk(id,btn){try{const r=await fetch(`/api/msgs/${id}/like`,{method:'POST'});if(!r.ok)return;const d=await r.json();btn.innerHTML='❤ '+d.likes}catch{}}
async function dm(id){if(!confirm('确认删除？'))return;try{await fetch(`/api/msgs/${id}`,{method:'DELETE'});location.reload()}catch{}}
function tr(id){const el=$(id?`ri-${id}`:'x');if(!id)return;el.style.display=el.style.display=='none'?'flex':'none'}
async function lr(id){try{const r=await fetch(`/api/msgs/${id}/replies`);const l=await r.json();const el=$(`rp-${id}`);if(!l.length)return;el.innerHTML=l.map(x=>`<div class="i"><span style="color:#4a6cf7;font-size:12px">${esc(x.name||'匿名')}</span> <span style="font-size:11px;color:#aaa">${ta(x.time)}</span><div>${esc(x.content)}</div></div>`).join('')}catch{}}
async function sr(id){const inp=$(`rn-${id}`);if(!inp.value.trim())return;try{await fetch(`/api/msgs/${id}/replies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:inp.value.trim()})});inp.value='';lr(id)}catch{}}
</script>
</body>
</html>
