<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>南海山</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
  transition:background .3s, color .3s;
}

/* ─── 主题 ─── */
[data-theme="dark"] { --bg:#141418; --bg2:#1c1c22; --bg3:#25252d; --fg:#e4e4e8; --fg2:#88889a; --fg3:#5c5c6e; --border:rgba(255,255,255,.06); --accent:#6c8cff; --accent2:#5ce0b8; --accent3:#ff8c6c; }
[data-theme="light"] { --bg:#f5f5f7; --bg2:#ffffff; --bg3:#eeeef0; --fg:#1a1a1e; --fg2:#6c6c7a; --fg3:#b0b0ba; --border:rgba(0,0,0,.08); --accent:#4a6cf7; --accent2:#2ab88e; --accent3:#e86a4a; }
[data-theme="sepia"] { --bg:#faf4e8; --bg2:#fff8ee; --bg3:#f0e8d8; --fg:#3a3024; --fg2:#7a6a54; --fg3:#b0a090; --border:rgba(0,0,0,.08); --accent:#b8653a; --accent2:#5a8a5a; --accent3:#8a6a4a; }

body { background:var(--bg); color:var(--fg); }

/* ─── 页面容器 ─── */
.pages { display:flex; height:100%; width:200%; transition:transform .6s cubic-bezier(.22,1,.36,1); }
.pages.shift { transform:translateX(-50%); }
.page { width:50%; height:100%; overflow-y:auto; }
.page::-webkit-scrollbar { width:0; }

/* ─── 导航栏 ─── */
.nav {
  position:sticky; top:0; z-index:10;
  padding:0 28px; height:52px;
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg2); border-bottom:1px solid var(--border);
}
.nav-l { display:flex; align-items:center; gap:20px; }
.nav-l h1 { font-size:14px; font-weight:600; letter-spacing:.5px; color:var(--fg); }
.nav-l h1 em { font-style:normal; color:var(--accent); }
.nav-tabs { display:flex; gap:2px; }
.nav-tabs button {
  padding:6px 14px; border:none; border-radius:6px;
  background:transparent; color:var(--fg2); font-size:13px;
  cursor:pointer; transition:all .2s;
}
.nav-tabs button:hover { color:var(--fg); background:var(--bg3); }
.nav-tabs button.active { background:var(--accent); color:#fff; }

.nav-r { display:flex; align-items:center; gap:8px; }
.theme-btn {
  padding:5px 10px; border:1px solid var(--border); border-radius:6px;
  background:var(--bg3); color:var(--fg2); font-size:11px;
  cursor:pointer; transition:all .15s;
}
.theme-btn:hover { color:var(--fg); border-color:var(--accent); }

/* ─── 社区 ─── */
.scene { max-width:600px; margin:0 auto; padding:28px 20px 80px; }
.scene h2 { font-size:13px; font-weight:600; letter-spacing:1px; color:var(--fg2); margin-bottom:16px; text-transform:uppercase; }

.in-box { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:20px; }
.in-box input, .in-box textarea { width:100%; border:none; background:transparent; outline:none; font:inherit; color:var(--fg); font-size:13px; resize:none; }
.in-box input { border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:8px; }
.in-box textarea { min-height:50px; }
.in-box ::placeholder { color:var(--fg3); }

.in-bar { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
.in-bar .c { font-size:11px; color:var(--fg3); }
.in-bar button {
  padding:6px 18px; border:none; border-radius:6px;
  background:var(--accent); color:#fff; font-size:12px; font-weight:500;
  cursor:pointer; transition:opacity .15s;
}
.in-bar button:hover { opacity:.85; }
.in-bar button:disabled { opacity:.4; cursor:not-allowed; }

.feed { display:flex; flex-direction:column; gap:0; }
.post { padding:14px 0; border-bottom:1px solid var(--border); }
.post:last-child { border:none; }
.pm { display:flex; gap:8px; align-items:center; margin-bottom:3px; }
.pn { font-size:12px; font-weight:600; color:var(--accent); }
.pt { font-size:11px; color:var(--fg3); }
.pc { font-size:13px; line-height:1.6; color:var(--fg); word-break:break-word; }
.empty { text-align:center; color:var(--fg3); padding:60px 0; font-size:13px; }

/* ─── 工作台 ─── */
.ws { padding:28px 20px; }
.ws h2 { font-size:13px; font-weight:600; letter-spacing:1px; color:var(--fg2); margin-bottom:16px; text-transform:uppercase; }

.ws-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.w-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  padding:20px; cursor:grab; transition:all .2s; user-select:none;
  position:relative;
}
.w-card:active { cursor:grabbing; }
.w-card:hover { border-color:var(--accent); background:var(--bg3); }
.w-card.dragging { opacity:.5; z-index:100; }
.w-card h3 { font-size:14px; font-weight:600; margin-bottom:4px; }
.w-card p { font-size:12px; color:var(--fg2); line-height:1.5; }
.w-card .drag-hint { position:absolute; top:8px; right:10px; font-size:11px; color:var(--fg3); opacity:0; transition:opacity .2s; }
.w-card:hover .drag-hint { opacity:1; }

/* ─── 视频模块展开 ─── */
.video-panel {
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  padding:16px; margin-top:12px;
}
.video-panel input {
  width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px;
  background:var(--bg3); color:var(--fg); font-size:13px; outline:none;
}
.video-panel input:focus { border-color:var(--accent); }
.video-panel input::placeholder { color:var(--fg3); }

.v-list { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
.v-item {
  display:flex; gap:10px; padding:8px; border-radius:6px;
  cursor:pointer; transition:background .15s; align-items:flex-start;
}
.v-item:hover { background:var(--bg3); }
.v-item .thumb {
  width:120px; height:68px; border-radius:6px; background:var(--bg3); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--fg3); overflow:hidden;
}
.v-item .thumb img { width:100%; height:100%; object-fit:cover; }
.v-item .info { flex:1; min-width:0; }
.v-item .info .t { font-size:13px; font-weight:500; color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.v-item .info .s { font-size:11px; color:var(--fg3); margin-top:2px; }

.v-player { margin-top:12px; border-radius:10px; overflow:hidden; background:#000; }
.v-player iframe { width:100%; height:360px; border:none; display:block; }

/* ─── 切换按钮 ─── */
.sw {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:50;
  display:flex; gap:4px; background:var(--bg2); border:1px solid var(--border);
  backdrop-filter:blur(12px); border-radius:20px; padding:4px;
}
.sw button {
  padding:6px 18px; border:none; border-radius:16px;
  background:transparent; color:var(--fg2); font-size:12px;
  cursor:pointer; transition:all .2s;
}
.sw button.active { background:var(--accent); color:#fff; }

#toast {
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%); z-index:60;
  background:var(--fg); color:var(--bg); padding:7px 16px; border-radius:8px;
  font-size:12px; opacity:0; transition:opacity .2s; pointer-events:none;
}
#toast.on { opacity:1; }

@media (max-width:480px) {
  .nav { padding:0 16px; }
  .nav-tabs button { padding:6px 10px; font-size:12px; }
  .scene, .ws { padding:16px; }
  .ws-grid { grid-template-columns:1fr; }
  .v-player iframe { height:200px; }
}
</style>
</head>
<body>
<div class="pages" id="pages">

<!-- 页面1：社区 -->
<div class="page">
  <div class="nav">
    <div class="nav-l">
      <h1>南海<em>山</em></h1>
      <div class="nav-tabs">
        <button class="active" onclick="go(1)">社区</button>
        <button onclick="go(2)">工作台</button>
      </div>
    </div>
    <div class="nav-r">
      <button class="theme-btn" onclick="cycleTheme()">◐ 主题</button>
    </div>
  </div>
  <div class="scene">
    <h2>社区</h2>
    <div class="in-box">
      <input id="inpN" placeholder="你的名字" maxlength="20">
      <textarea id="inpC" placeholder="说点什么…" maxlength="1000"></textarea>
      <div class="in-bar">
        <span class="c"><span id="cc">0</span>/1000</span>
        <button id="btnSend">发布</button>
      </div>
    </div>
    <div class="feed" id="feed"><div class="empty">加载中…</div></div>
  </div>
</div>

<!-- 页面2：工作台 -->
<div class="page">
  <div class="nav">
    <div class="nav-l">
      <h1>南海<em>山</em></h1>
      <div class="nav-tabs">
        <button onclick="go(1)">社区</button>
        <button class="active" onclick="go(2)">工作台</button>
      </div>
    </div>
    <div class="nav-r">
      <button class="theme-btn" onclick="cycleTheme()">◐ 主题</button>
    </div>
  </div>
  <div class="ws">
    <h2>工作台</h2>
    <div class="ws-grid" id="wsGrid">
      <div class="w-card" data-idx="0"><h3>视频</h3><p>搜索B站内容，直接播放</p><span class="drag-hint">⠿</span></div>
      <div class="w-card" data-idx="1"><h3>AI 助手</h3><p>自备Key，多模型<br><span style="font-size:11px;color:var(--fg3)">即将开放</span></p><span class="drag-hint">⠿</span></div>
      <div class="w-card" data-idx="2"><h3>知识库</h3><p>Obsidian笔记对接<br><span style="font-size:11px;color:var(--fg3)">即将开放</span></p><span class="drag-hint">⠿</span></div>
    </div>
    <!-- 视频面板 -->
    <div id="videoPanel">
      <div class="video-panel">
        <input id="vSearch" placeholder="搜索B站视频…" onkeydown="if(event.key==='Enter')searchVideo()">
        <div class="v-list" id="vList"><div style="text-align:center;padding:20px;color:var(--fg3);font-size:13px;">输入关键词搜索视频</div></div>
        <div class="v-player" id="vPlayer" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

</div>

<div class="sw">
  <button class="active" onclick="go(1)">社区</button>
  <button onclick="go(2)">工作台</button>
</div>
<div id="toast"></div>

<script>
// ─── 主题切换 ───
const THEMES = ['dark','light','sepia'];
let ti = 0;
function cycleTheme() {
  ti = (ti + 1) % THEMES.length;
  document.documentElement.setAttribute('data-theme', THEMES[ti]);
  localStorage.setItem('nhs-theme', THEMES[ti]);
}
const saved = localStorage.getItem('nhs-theme');
if (saved) { ti = THEMES.indexOf(saved); if(ti<0)ti=0; document.documentElement.setAttribute('data-theme', THEMES[ti]); }
else { document.documentElement.setAttribute('data-theme', 'dark'); }

// ─── 页面切换 ───
function go(n) {
  document.getElementById('pages').classList.toggle('shift', n===2);
  document.querySelectorAll('.nav-tabs button, .sw button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.nav-tabs button:nth-child(${n}), .sw button:nth-child(${n})`).forEach(b => b.classList.add('active'));
}

// ─── 工作台模块拖拽 ───
const grid = document.getElementById('wsGrid');
let dragEl = null, dragIdx = -1;
grid.querySelectorAll('.w-card').forEach(c => {
  c.addEventListener('mousedown', e => {
    dragEl = c; dragIdx = parseInt(c.dataset.idx);
    c.classList.add('dragging');
  });
});
document.addEventListener('mousemove', e => {
  if (!dragEl) return;
  const cards = [...grid.querySelectorAll('.w-card')];
  const el = cards.find(c => c !== dragEl && e.clientY < c.getBoundingClientRect().top + c.offsetHeight/2);
  if (el) grid.insertBefore(dragEl, el);
  else grid.appendChild(dragEl);
});
document.addEventListener('mouseup', () => {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  // 重新编号
  grid.querySelectorAll('.w-card').forEach((c,i) => c.dataset.idx = i);
  dragEl = null;
});

// ─── 视频搜索 ───
async function searchVideo() {
  const q = document.getElementById('vSearch').value.trim();
  if (!q) return;
  const el = document.getElementById('vList');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--fg3);font-size:13px;">搜索中…</div>';
  try {
    const r = await fetch(`https://api.bilibili.com/x/web-interface/search/type?search_type=video&keyword=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (d.code !== 0 || !d.data || !d.data.result) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--fg3);font-size:13px;">搜索失败，B站API限制</div>'; return; }
    renderVideos(d.data.result.slice(0, 8));
  } catch {
    // 备用搜索
    try {
      const r = await fetch(`https://api.bilibili.com/x/web-interface/search/all/v2?keyword=${encodeURIComponent(q)}`);
      const d = await r.json();
      if (d.code !== 0) throw 'err';
      const items = d.data?.video || [];
      renderVideos(items.slice(0, 8));
    } catch {
      el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--fg3);font-size:13px;">搜索服务暂不可用</div>';
    }
  }
}

function renderVideos(videos) {
  const el = document.getElementById('vList');
  if (!videos || !videos.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--fg3);font-size:13px;">未找到视频</div>'; return; }
  el.innerHTML = videos.map(v => {
    const aid = v.aid || v.id;
    const pic = v.pic || `//i0.hdslb.com/bfs/archive/${v.pic}`;
    const title = v.title?.replace(/<[^>]+>/g,'') || '视频';
    const author = v.author || v.name || '';
    const play = v.play ? `${(v.play/10000).toFixed(1)}万播放` : '';
    return `<div class="v-item" onclick="playVideo(${aid})">
      <div class="thumb"><img src="${pic.startsWith('//')?'https:'+pic:pic}" onerror="this.outerHTML='▶'" loading="lazy"></div>
      <div class="info"><div class="t">${escapeHtml(title)}</div><div class="s">${author} ${play}</div></div>
    </div>`;
  }).join('');
}

function playVideo(aid) {
  const p = document.getElementById('vPlayer');
  p.style.display = 'block';
  p.innerHTML = `<iframe src="https://player.bilibili.com/player.html?bvid=${aid}&autoplay=1" allowfullscreen></iframe>`;
  p.scrollIntoView({behavior:'smooth'});
}

// ─── 社区 ───
document.getElementById('btnSend').onclick = sendMsg;
document.getElementById('inpC').oninput = () => document.getElementById('cc').textContent = document.getElementById('inpC').value.length;
load();
async function load() { try { const r=await fetch('/api/msgs'); const m=await r.json(); render(m); } catch {} }
function render(msgs) {
  const el=document.getElementById('feed');
  if(!msgs.length){el.innerHTML='<div class="empty">还没有留言</div>';return;}
  el.innerHTML=msgs.map(m=>`<div class="post"><div class="pm"><span class="pn">${esc(m.name||'匿名')}</span><span class="pt">${ta(new Date(m.time))}</span></div><div class="pc">${esc(m.content)}</div></div>`).join('');
}
async function sendMsg() {
  const n=document.getElementById('inpN').value.trim(), c=document.getElementById('inpC').value.trim();
  if(!c) return;
  const btn=document.getElementById('btnSend'); btn.disabled=true; btn.textContent='…';
  try {
    const r=await fetch('/api/msgs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,content:c})});
    if(r.status===403){const d=await r.json();toast(d.error||'被拒');return;}
    if(!r.ok){toast('失败');return;}
    document.getElementById('inpN').value=''; document.getElementById('inpC').value=''; document.getElementById('cc').textContent='0';
    load();
  }catch{toast('网络错误')}
  finally{btn.disabled=false;btn.textContent='发布';}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function ta(d){const s=(Date.now()-d)/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2000);}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
