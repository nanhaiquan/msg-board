<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>南海山</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,"Segoe UI","Noto Sans SC",sans-serif;background:#0c0c0e;color:#ddd;transition:background .3s,color .3s}

/* ─── 主题 ─── */
[data-theme=dark]{--bg:#0c0c0e;--b2:#131315;--b3:#1a1a1e;--fg:#ddd;--f2:#6b6b7a;--f3:#3b3b44;--ln:rgba(255,255,255,.05);--ac:#5c8cff;--ac2:#4ccc9a;--ac3:#cc6c4a}
[data-theme=light]{--bg:#eeeef0;--b2:#fff;--b3:#e4e4e8;--fg:#1a1a1e;--f2:#6b6b7a;--f3:#b0b0ba;--ln:rgba(0,0,0,.06);--ac:#4a6cf7;--ac2:#2ab88e;--ac3:#e86a4a}
[data-theme=sepia]{--bg:#eae2d4;--b2:#f5ede0;--b3:#ddd4c4;--fg:#3a3024;--f2:#7a6a54;--f3:#b0a090;--ln:rgba(0,0,0,.06);--ac:#b8653a;--ac2:#5a8a5a;--ac3:#8a6a4a}

body{background:var(--bg);color:var(--fg)}

/* ─── 布局 ─── */
.wrap{display:flex;height:100%;width:200%;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.wrap.s2{transform:translateX(-50%)}
.page{width:50%;height:100%;overflow-y:auto;position:relative}
.page::-webkit-scrollbar{width:0}

/* ─── 导航 ─── */
.nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:var(--b2);border-bottom:1px solid var(--ln)}
.nav .brand{font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--fg)}
.nav .brand em{font-style:normal;color:var(--ac)}
.nav .pgname{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;font-weight:500;color:var(--f2);letter-spacing:1px;cursor:pointer;padding:4px 12px;border-radius:4px;transition:background .15s;user-select:none}
.nav .pgname:hover{background:var(--b3)}
.nav .nav-r{display:flex;gap:6px}
.nav .nav-r button{background:var(--b3);border:1px solid var(--ln);border-radius:5px;padding:4px 10px;color:var(--f2);font-size:11px;cursor:pointer;transition:all .15s}
.nav .nav-r button:hover{color:var(--fg);border-color:var(--ac)}

/* ─── 社区 ─── */
.scene{padding:20px 20px 80px;max-width:540px;margin:0 auto}
.ib{background:var(--b2);border:1px solid var(--ln);border-radius:8px;padding:12px;margin-bottom:16px}
.ib input,.ib textarea{width:100%;border:none;background:none;outline:none;font:inherit;color:var(--fg);font-size:13px;resize:none}
.ib input{border-bottom:1px solid var(--ln);padding-bottom:8px;margin-bottom:8px}
.ib textarea{min-height:48px}
.ib ::placeholder{color:var(--f3)}
.ibar{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ibar .c{font-size:11px;color:var(--f3)}
.ibar button{padding:6px 18px;border:none;border-radius:6px;background:var(--ac);color:#fff;font-size:12px;cursor:pointer;transition:opacity .15s;font-weight:500}
.ibar button:hover{opacity:.85}
.feed{display:flex;flex-direction:column}
.pst{padding:14px 0;border-bottom:1px solid var(--ln)}
.pst:last-child{border:none}
.pm{display:flex;gap:8px;align-items:center;margin-bottom:2px}
.nn{font-size:12px;font-weight:500;color:var(--ac)}
.tt{font-size:11px;color:var(--f3)}
.ct{font-size:13px;line-height:1.6;color:var(--fg)}
.pa{display:flex;gap:8px;margin-top:4px}
.pa button{background:none;border:none;color:var(--f3);font-size:11px;cursor:pointer;padding:2px 4px;transition:color .15s}
.pa button:hover{color:var(--ac)}
.rpl{margin-top:6px;margin-left:16px;padding-left:10px;border-left:2px solid var(--ln)}
.rp{font-size:12px;padding:5px 0}
.ri{display:flex;gap:6px;margin-top:6px;margin-left:16px}
.ri input{flex:1;padding:6px 10px;border:1px solid var(--ln);border-radius:6px;background:var(--b3);color:var(--fg);font-size:12px;outline:none}
.ri input:focus{border-color:var(--ac)}
.ri button{padding:4px 12px;border:none;border-radius:4px;background:var(--ac);color:#fff;font-size:11px;cursor:pointer}

/* ─── 浮窗系统 ─── */
.wk{padding:20px 20px;min-height:400px}
.fw{position:fixed;background:var(--b2);border:1px solid var(--ln);border-radius:8px;z-index:100;box-shadow:0 4px 32px rgba(0,0,0,.15);overflow:hidden;min-width:80px;backdrop-filter:blur(8px)}
.fw.top{z-index:200}
.fw.hidden{display:none!important}
.fw-hd{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:grab;user-select:none}
.fw-hd:active{cursor:grabbing}
.fw-hd .i{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.fw-hd .t{font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--fg)}
.fw-hd .x{margin-left:auto;background:none;border:none;color:var(--f3);font-size:8px;cursor:pointer;padding:2px 4px;line-height:1;border-radius:3px;transition:all .15s}
.fw-hd .x:hover{background:var(--b3);color:var(--fg)}
.fw-bd{display:none;padding:0 10px 10px;cursor:default}
.fw.open .fw-bd{display:block}
.fw.open{min-width:300px}
.fw.open .fw-hd{border-bottom:1px solid var(--ln);padding-bottom:8px;margin-bottom:0}
.fw-bd p{font-size:12px;color:var(--f2);line-height:1.5}

/* ─── 视频 ─── */
.vl{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.vi{display:flex;gap:8px;padding:4px;border-radius:4px;cursor:pointer;transition:background .15s}
.vi:hover{background:var(--b3)}
.vi .vh{width:80px;height:45px;border-radius:4px;background:var(--b3);flex-shrink:0;overflow:hidden}
.vi .vh img{width:100%;height:100%;object-fit:cover}
.vi .vf{flex:1;min-width:0}
.vi .vf .vt{font-size:11px;font-weight:500;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vi .vf .vs{font-size:10px;color:var(--f3)}
.vp{margin-top:6px;border-radius:6px;overflow:hidden;background:#000;display:none}
.vp iframe{width:100%;height:180px;border:none;display:block}

/* ─── 添加模块按钮 ─── */
.add-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border:1px solid var(--ln);border-radius:5px;background:var(--b2);color:var(--f2);font-size:11px;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:var(--ac);color:var(--fg)}

/* ─── 底部切换 ─── */
.btm{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:4px;background:var(--b2);border:1px solid var(--ln);border-radius:20px;padding:3px;backdrop-filter:blur(12px)}
.btm button{padding:5px 14px;border:none;border-radius:16px;background:transparent;color:var(--f2);font-size:11px;cursor:pointer;transition:all .2s}
.btm button:active{background:var(--b3)}

#tst{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:300;background:var(--fg);color:var(--bg);padding:5px 12px;border-radius:6px;font-size:11px;opacity:0;transition:opacity .2s;pointer-events:none}
#tst.on{opacity:1}

@media(max-width:480px){
  .nav{padding:0 12px}
  .scene{padding:16px 12px}
  .fw.open{min-width:260px}
}
</style>
</head>
<body>
<div class="wrap" id="wrap">

<!-- 社区 -->
<div class="page">
  <div class="nav">
    <div class="brand">南海<em>山</em></div>
    <span class="pgname" id="pn1" onclick="tg()">社区</span>
    <div class="nav-r"><button onclick="ct()">主题</button></div>
  </div>
  <div class="scene">
    <div class="ib">
      <input id="n" placeholder="昵称" maxlength="20">
      <textarea id="c" placeholder="说点什么…" maxlength="1000"></textarea>
      <div class="ibar"><span class="c"><span id="cc">0</span></span><button id="s">发布</button></div>
    </div>
    <div class="feed" id="fd"><div style="text-align:center;color:var(--f3);padding:60px 0;font-size:13px">加载</div></div>
  </div>
</div>

<!-- 工作台 -->
<div class="page">
  <div class="nav">
    <div class="brand">南海<em>山</em></div>
    <span class="pgname" onclick="tg()">工作台</span>
    <div class="nav-r"><button onclick="ct()">主题</button><span class="add-btn" onclick="am()">＋</span></div>
  </div>
  <div class="wk" id="wka">

    <!-- 视频 -->
    <div class="fw open" id="wv" style="left:20px;top:60px">
      <div class="fw-hd"><span class="i" style="background:var(--ac)"></span><span class="t">视频</span><button class="x" onclick="h('wv')">✕</button></div>
      <div class="fw-bd">
        <input id="vs" placeholder="搜索…" style="width:100%;padding:6px 10px;border:1px solid var(--ln);border-radius:4px;background:var(--b3);color:var(--fg);font-size:12px;outline:none" onkeydown="if(event.key=='Enter')sv()">
        <div class="vl" id="vl"><div style="text-align:center;padding:12px;color:var(--f3);font-size:11px">搜索视频</div></div>
        <div class="vp" id="vp"><iframe allowfullscreen></iframe></div>
      </div>
    </div>

    <!-- AI -->
    <div class="fw" id="wa" style="left:340px;top:60px">
      <div class="fw-hd"><span class="i" style="background:var(--ac2)"></span><span class="t">AI</span><button class="x" onclick="h('wa')">✕</button></div>
      <div class="fw-bd">
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <input id="aiKey" placeholder="API Key" style="flex:1;padding:5px 8px;border:1px solid var(--ln);border-radius:4px;background:var(--b3);color:var(--fg);font-size:11px;outline:none">
          <select id="aiModel" style="padding:4px 6px;border:1px solid var(--ln);border-radius:4px;background:var(--b3);color:var(--fg);font-size:11px;outline:none">
            <option value="deepseek-chat">DeepSeek</option>
            <option value="claude-3-haiku">Claude Haiku</option>
            <option value="gpt-4o-mini">GPT-4o Mini</option>
          </select>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:6px">
          <input id="aiProxy" placeholder="代理地址(可选)" style="flex:1;padding:4px 8px;border:1px solid var(--ln);border-radius:4px;background:var(--b3);color:var(--fg);font-size:11px;outline:none">
        </div>
        <div id="aiChat" style="max-height:200px;overflow-y:auto;margin-bottom:6px;padding:6px;background:var(--b3);border-radius:4px;font-size:12px;color:var(--f2);min-height:60px">输入消息开始对话</div>
        <div style="display:flex;gap:4px">
          <input id="aiInp" placeholder="输入消息…" style="flex:1;padding:5px 8px;border:1px solid var(--ln);border-radius:4px;background:var(--b3);color:var(--fg);font-size:12px;outline:none" onkeydown="if(event.key=='Enter')aiSend()">
          <button onclick="aiSend()" style="padding:4px 12px;border:none;border-radius:4px;background:var(--ac);color:#fff;font-size:11px;cursor:pointer">发送</button>
        </div>
      </div>
    </div>

    <!-- 知识库 -->
    <div class="fw" id="wk" style="left:20px;top:200px">
      <div class="fw-hd"><span class="i" style="background:var(--ac3)"></span><span class="t">知识库</span><button class="x" onclick="h('wk')">✕</button></div>
      <div class="fw-bd"><p style="color:var(--f3)">Obsidian·即将开放</p></div>
    </div>

  </div>
</div>

</div>

<div class="btm"><button onclick="P(1)">◀</button><button onclick="P(2)">▶</button></div>
<div id="tst"></div>

<script>
// ═══ 核心 ═══
let cp=1;
const $=id=>document.getElementById(id);
const ts=m=>{const t=$('tst');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1500)};
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const ta=t=>{const d=new Date(t),s=(Date.now()-d)/1000;if(s<10)return'刚刚';if(s<60)return Math.floor(s)+'秒';if(s<3600)return Math.floor(s/60)+'分';if(s<86400)return Math.floor(s/3600)+'时';return Math.floor(s/86400)+'天'}

// ═══ 页面 ═══
function P(n){cp=n;$('wrap').className='wrap'+(n==2?' s2':'');document.querySelectorAll('.fw').forEach(f=>f.style.display=n==2?'block':'none')}
function tg(){P(cp==1?2:1)}

// ═══ 浮窗 ═══
function h(id){$(id).classList.add('hidden')}
function am(){const hh=['wv','wa','wk'].filter(id=>$(id).classList.contains('hidden'));if(!hh.length){ts('已全部显示');return}hh.forEach(id=>$(id).classList.remove('hidden'))}

// 拖拽+置顶
(function(){let d=null,ox=0,oy=0;
document.addEventListener('mousedown',e=>{const h=e.target.closest('.fw-hd');if(!h)return;d=h.closest('.fw');d.classList.add('top');const r=d.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top});
document.addEventListener('mousemove',e=>{if(!d)return;d.style.left=(e.clientX-ox)+'px';d.style.top=(e.clientY-oy)+'px'});
document.addEventListener('mouseup',()=>{d=null});
document.addEventListener('mousedown',e=>{const w=e.target.closest('.fw');if(w){document.querySelectorAll('.fw').forEach(x=>x.classList.remove('top'));w.classList.add('top')}})})();

// 折叠
document.querySelectorAll('.fw-hd').forEach(h=>{h.addEventListener('click',e=>{if(e.target.closest('.x'))return;h.closest('.fw').classList.toggle('open')})});

// ═══ 主题 ═══
const TS=['dark','light','sepia'];let ti=0;
const sv=localStorage.getItem('nhs-theme');
if(sv&&TS.includes(sv)){ti=TS.indexOf(sv);document.documentElement.setAttribute('data-theme',sv)}
function ct(){ti=(ti+1)%TS.length;document.documentElement.setAttribute('data-theme',TS[ti]);localStorage.setItem('nhs-theme',TS[ti])}

// ═══ AI 助手 ═══
async function aiSend(){
  const key=$('aiKey').value.trim(),msg=$('aiInp').value.trim(),model=$('aiModel').value,proxy=$('aiProxy').value.trim();
  if(!msg)return;if(!key){ts('请先输入API Key');return}
  const chat=$('aiChat');chat.innerHTML+=`<div style="color:var(--fg);margin-bottom:4px">🙂 ${esc(msg)}</div>`;$('aiInp').value='';chat.scrollTop=chat.scrollHeight;
  chat.innerHTML+=`<div style="color:var(--f3);margin-bottom:4px">⏳ 思考中…</div>`;
  const base=proxy||'https://api.deepseek.com';
  try{
    const r=await fetch(base+'/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model,messages:[{role:'user',content:msg}],max_tokens:1024})
    });
    if(!r.ok){chat.innerHTML=chat.innerHTML.replace('<div style="color:var(--f3);margin-bottom:4px">⏳ 思考中…</div>','')+`<div style="color:var(--ac3);margin-bottom:4px">⚠️ 请求失败 ${r.status}</div>`;return}
    const d=await r.json();
    const reply=d.choices?.[0]?.message?.content||'无回复';
    chat.innerHTML=chat.innerHTML.replace('<div style="color:var(--f3);margin-bottom:4px">⏳ 思考中…</div>','')+`<div style="color:var(--ac2);margin-bottom:4px">🤖 ${esc(reply)}</div>`;
    chat.scrollTop=chat.scrollHeight;
  }catch{chat.innerHTML=chat.innerHTML.replace('<div style="color:var(--f3);margin-bottom:4px">⏳ 思考中…</div>','')+`<div style="color:var(--ac3);margin-bottom:4px">⚠️ 网络错误</div>`}
}
// ═══ 视频 ═══
async function sv(){const q=$('vs').value.trim();if(!q)return;$('wv').classList.add('open');const el=$('vl');el.innerHTML='<div style="text-align:center;padding:12px;color:var(--f3);font-size:11px">…</div>';
try{const r=await fetch(`https://api.bilibili.com/x/web-interface/search/type?search_type=video&keyword=${encodeURIComponent(q)}`);const d=await r.json();if(d.code!=0||!d.data?.result)return;rv(d.data.result.slice(0,6))}catch{try{const r=await fetch(`https://api.bilibili.com/x/web-interface/search/all/v2?keyword=${encodeURIComponent(q)}`);const d=await r.json();if(d.code==0)rv((d.data?.video||[]).slice(0,6))}catch{}}}
function rv(v){const el=$('vl');if(!v.length){el.innerHTML='<div style="text-align:center;padding:12px;color:var(--f3);font-size:11px">无结果</div>';return}
el.innerHTML=v.map(x=>{const p=x.pic||'',t=(x.title||'').replace(/<[^>]+>/g,'')||'',a=x.author||x.name||'',pl=x.play?(x.play/10000).toFixed(1)+'万':'';return`<div class="vi" onclick="pv(${x.aid||x.id})"><div class="vh"><img src="${p.startsWith('//')?'https:'+p:p}" loading="lazy"></div><div class="vf"><div class="vt">${esc(t)}</div><div class="vs">${esc(a)} ${pl}</div></div></div>`}).join('')}
function pv(aid){$('wv').classList.add('open');const p=$('vp');p.style.display='block';p.querySelector('iframe').src=`https://player.bilibili.com/player.html?bvid=${aid}&autoplay=1`}

// ═══ 社区 ═══
$('s').onclick=sendMsg;$('c').oninput=()=>$('cc').textContent=$('c').value.length;load();
async function load(){try{const r=await fetch('/api/msgs');const m=await r.json();render(m)}catch{}}
function render(msgs){const el=$('fd');if(!msgs.length){el.innerHTML='<div style="text-align:center;color:var(--f3);padding:60px 0;font-size:13px">还没有</div>';return}
el.innerHTML=msgs.map(m=>`<div class="pst"><div class="pm"><span class="nn">${esc(m.name||'匿名')}</span><span class="tt">${ta(m.time)}</span></div><div class="ct">${esc(m.content)}</div><div class="pa"><button onclick="lk(${m._id},this)">♡ ${m.likes||0}</button><button onclick="tr(${m._id})">回复</button><button onclick="dm(${m._id})">✕</button></div><div class="rpl" id="rp-${m._id}"></div><div class="ri" id="ri-${m._id}" style="display:none"><input id="rn-${m._id}" placeholder="回复…" maxlength="500"><button onclick="sr(${m._id})">回复</button></div></div>`).join('');
msgs.forEach(m=>lr(m._id))}
async function sendMsg(){const n=$('n').value.trim(),c=$('c').value.trim();if(!c)return;const b=$('s');b.disabled=true;b.textContent='…';try{const r=await fetch('/api/msgs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,content:c})});if(r.status==403){const d=await r.json();ts(d.error||'被拒');return}if(!r.ok){ts('失败');return}$('n').value='';$('c').value='';$('cc').textContent='0';load()}catch{ts('网络错误')}finally{b.disabled=false;b.textContent='发布'}}
async function lk(id,btn){try{const r=await fetch(`/api/msgs/${id}/like`,{method:'POST'});if(!r.ok)return;const d=await r.json();btn.innerHTML='❤ '+d.likes}catch{}}
async function dm(id){if(!confirm('确认？'))return;try{await fetch(`/api/msgs/${id}`,{method:'DELETE'});document.getElementById(`p-${id}`).remove()}catch{}}
function tr(id){const el=$(`ri-${id}`);el.style.display=el.style.display=='none'?'flex':'none'}
async function lr(id){try{const r=await fetch(`/api/msgs/${id}/replies`);const l=await r.json();const el=$(`rp-${id}`);if(!l.length)return;el.innerHTML=l.map(x=>`<div class="rp"><span style="color:var(--ac);font-size:11px">${esc(x.name||'匿名')}</span> <span style="font-size:10px;color:var(--f3)">${ta(x.time)}</span><div style="font-size:12px">${esc(x.content)}</div></div>`).join('')}catch{}}
async function sr(id){const inp=$(`rn-${id}`);if(!inp.value.trim())return;try{await fetch(`/api/msgs/${id}/replies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:inp.value.trim()})});inp.value='';lr(id)}catch{}}
</script>
</body>
</html>
