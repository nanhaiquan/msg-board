<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="siteTitle">留言板</title>
<style>
:root {
  --accent: #4A90D9;
  --accent-light: #EBF3FB;
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --fg: #1A1A1A;
  --fg2: #6B6B6B;
  --fg3: #B0B0B0;
  --border: #E8E8E8;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font: 400 14px/1.6 -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--fg); min-height: 100vh;
}
/* 导航 */
nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.nav-inner {
  max-width: 680px; margin: 0 auto; padding: 0 20px;
  height: 48px; display: flex; align-items: center; justify-content: space-between;
}
.nav-title { font-weight: 700; font-size: 15px; color: var(--accent); }
.nav-title span { color: var(--fg); }
.nav-links { display: flex; gap: 20px; }
.nav-links a { text-decoration: none; color: var(--fg2); font-size: 13px; transition: color .2s; }
.nav-links a:hover { color: var(--accent); }

/* 主内容 */
.main { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
.header { margin-bottom: 32px; }
.header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.header p { color: var(--fg2); font-size: 14px; }

/* 输入区 */
.input-area {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 24px;
}
.input-area input, .input-area textarea {
  width: 100%; border: none; outline: none; font: inherit;
  resize: vertical; min-height: 40px; font-size: 14px;
}
.input-area input { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px; }
.input-area textarea { min-height: 60px; }
.input-bottom {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.char-count { font-size: 12px; color: var(--fg3); }
.btn-send {
  background: var(--accent); color: #fff; border: none;
  padding: 6px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
}
.btn-send:hover { opacity: .85; }
.btn-send:disabled { opacity: .4; cursor: not-allowed; }

/* 留言列表 */
.msg-list { display: flex; flex-direction: column; gap: 0; }
.msg-item {
  padding: 16px 0; border-bottom: 1px solid var(--border);
}
.msg-item:last-child { border-bottom: none; }
.msg-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.msg-name { font-weight: 600; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--fg3); }
.msg-content { font-size: 14px; line-height: 1.7; word-break: break-word; }

/* 空状态 */
.empty { text-align: center; color: var(--fg3); padding: 48px 0; font-size: 14px; }

/* Footer */
footer {
  text-align: center; padding: 24px 20px;
  color: var(--fg3); font-size: 12px;
  border-top: 1px solid var(--border);
}

/* About Page */
.about-content { max-width: 600px; }
.about-content p { color: var(--fg2); font-size: 14px; line-height: 1.8; margin-bottom: 16px; }

@media (max-width: 480px) {
  .main { padding: 24px 16px 60px; }
  .header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-title"><span id="navPrefix">✦ </span><span id="navTitle">留言板</span></div>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/about">关于</a>
    </div>
  </div>
</nav>

<div class="main" id="app"></div>

<footer>© 2026 · 匿名留言板</footer>

<script>
// ─── 配置（可改） ───
const SITE = {
  title: '留言板',
  desc: '留下你想说的话',
  accent: '#4A90D9',
};
// ──────────────────

const app = document.getElementById('app');
const page = location.pathname;

if (page === '/about') {
  document.getElementById('navTitle').textContent = '关于';
  app.innerHTML = '<div class="about-content"><h1>关于</h1><p>这是一个简约的匿名留言板。无需注册，任何人都可以留下想说的话。</p><p>北欧极简设计，白灰基底，一色点缀。所有数据存储在云端。</p></div>';
} else {
  document.getElementById('navTitle').textContent = SITE.title;
  document.title = SITE.title;
  renderBoard();
}

function renderBoard() {
  app.innerHTML = `
    <div class="header">
      <h1>${SITE.title}</h1>
      <p>${SITE.desc}</p>
    </div>
    <div class="input-area">
      <input id="inpName" placeholder="你的名字（留空为匿名）" maxlength="20">
      <textarea id="inpContent" placeholder="写点什么…" maxlength="1000"></textarea>
      <div class="input-bottom">
        <span class="char-count"><span id="charCount">0</span>/1000</span>
        <button class="btn-send" id="btnSend">发布</button>
      </div>
    </div>
    <div class="msg-list" id="msgList">
      <div class="empty">加载中…</div>
    </div>
  `;

  document.getElementById('inpContent').addEventListener('input', () => {
    document.getElementById('charCount').textContent =
      document.getElementById('inpContent').value.length;
  });

  document.getElementById('btnSend').addEventListener('click', sendMsg);
  loadMsgs();
}

async function loadMsgs() {
  try {
    const r = await fetch('/api/msgs');
    const msgs = await r.json();
    renderMsgs(msgs);
  } catch { /* ignore */ }
}

function renderMsgs(msgs) {
  const el = document.getElementById('msgList');
  if (!msgs.length) {
    el.innerHTML = '<div class="empty">还没有留言，来说点什么吧</div>';
    return;
  }
  el.innerHTML = msgs.map(m => `
    <div class="msg-item">
      <div class="msg-meta">
        <span class="msg-name" style="color:var(--accent)">${esc(m.name || '匿名')}</span>
        <span class="msg-time">${timeAgo(new Date(m.time))}</span>
      </div>
      <div class="msg-content">${esc(m.content)}</div>
    </div>
  `).join('');
}

async function sendMsg() {
  const name = document.getElementById('inpName').value.trim();
  const content = document.getElementById('inpContent').value.trim();
  if (!content) return;

  const btn = document.getElementById('btnSend');
  btn.disabled = true; btn.textContent = '发布中…';

  try {
    const r = await fetch('/api/msgs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, content }),
    });
    if (!r.ok) { alert('发布失败'); return; }
    document.getElementById('inpName').value = '';
    document.getElementById('inpContent').value = '';
    document.getElementById('charCount').textContent = '0';
    loadMsgs();
  } catch { alert('网络错误'); }
  finally { btn.disabled = false; btn.textContent = '发布'; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s; return d.innerHTML;
}

function timeAgo(d) {
  const s = (Date.now() - d) / 1000;
  if (s < 60) return '刚刚';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  if (s < 86400) return Math.floor(s/3600) + '小时前';
  return Math.floor(s/86400) + '天前';
}
</script>
</body>
</html>
